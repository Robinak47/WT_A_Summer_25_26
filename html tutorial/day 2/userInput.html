<!DOCTYPE html>
<html>

<head>
    <title>user Input</title>
</head>

<body>
    <form>
        <fieldset>
            <legend>Personal Information</legend>
            <label>Name:</label>
            <input type="text" placeholder="enter your name"><br><br>
            <label>age:</label>
            <input type="number">
            <br><br>
            <label>Email:</label>
            <input type="email">

            <br><br>
            <label>Password:</label>
            <input type="password">

            <br><br>
            <label>gender:</label>
            <input type="radio" name="gender" value="male">male
            <input type="radio" name="gender" value="" female>female
            <input type="radio" name="gender" value="other">other

            <br><br>
            <label>fab Sports:</label>
            <input type="checkbox" name="sports" value="cricket">cricket
            <input type="checkbox" name="sports" value="football">football
            <input type="checkbox" name="sports" value="chess">chess

            <br><br>
            <label>Country</label>
            <select>
                <option value="">Select a country </option>
                <option value="usa">USA</option>
                <option value="UK">UK</option>
                <option value="BD">BD</option>
            </select>
            <br><br>

            <label>Date of Birth</label>
            <input type="date">
            <br><br>
        </fieldset>

        <fieldset>
            <legend>Academic Information</legend>

            <label>upload your markSheet</label>
            <input type="file" accept="application/pdf"><br>
            <br>
            <label>class Time</label>
            <input type="time">
            <br><br>
        </fieldset>

        <input type="submit">
        <input type="reset">

    </form>
</body>

</html>
